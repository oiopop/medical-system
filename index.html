<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        const firebaseConfig = {
            apiKey: "AIzaSyByGBZsjwFyAwqE1qoK7fKZaz3JJPiK4Mo",

            projectId: "al-kafaah-team",
            storageBucket: "al-kafaah-team.firebasestorage.app",
            messagingSenderId: "105895923732",

            measurementId: "G-99H0P9LPJ4"

        try {
            const app = initializeApp(firebaseConfig);

      #pwaInstallBtn{position:fixed;left:16px;bottom:16px;z-index:9999;background:#0f766e;color:#fff;border:none;border-radius:999px;padding:12px 16px;font-family:'Cairo',sans-serif;font-weight:700;box-shadow:0 10px 25px rgba(0,0,0,.18);cursor:pointer;display:none}
      #pwaInstallBtn:hover{filter:brightness(.96)}
      #offlineBadge{position:fixed;right:16px;bottom:16px;z-index:9998;background:#111827;color:#fff;border-radius:12px;padding:10px 14px;font-family:'Cairo',sans-serif;font-size:13px;display:none;box-shadow:0 10px 25px rgba(0,0,0,.18)}
      #iosInstallHint{position:fixed;left:16px;right:16px;bottom:76px;z-index:9997;background:#ffffff;color:#0f172a;border:1px solid #d1d5db;border-radius:16px;padding:14px 16px;font-family:'Cairo',sans-serif;font-size:14px;line-height:1.9;display:none;box-shadow:0 10px 25px rgba(0,0,0,.12)}
      #iosInstallHint button{margin-top:8px;background:#0f766e;color:#fff;border:none;border-radius:10px;padding:8px 12px;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer}

<body>
<button id="pwaInstallBtn" type="button">تثبيت التطبيق</button>
<div id="offlineBadge">أنت الآن تعمل بدون إنترنت</div>
<div id="iosInstallHint">لتثبيت التطبيق على iPhone أو iPad: افتح الموقع من Safari ثم اضغط زر المشاركة واختر <b>Add to Home Screen</b>.<br><button type="button" onclick="this.parentElement.style.display='none'">حسنًا</button></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const ROLE_CONFIG = {
            Doctor: { text: 'text-blue-700', light: 'bg-blue-50', label: 'طبيب مختص' },
            Student: { text: 'text-emerald-700', light: 'bg-emerald-50', label: 'طالب متطوع' },
            Paramedic: { text: 'text-amber-700', light: 'bg-amber-50', label: 'مسعف ميداني' },
            Admin: { text: 'text-slate-800', light: 'bg-slate-100', label: 'إدارة الفريق' },
            SuperAdmin: { text: 'text-indigo-900', light: 'bg-indigo-100', label: 'المالك والإدارة العليا' },
        };

        const TEAM_COLORS = ['bg-blue-600', 'bg-slate-900', 'bg-emerald-600', 'bg-red-700', 'bg-amber-500', 'bg-indigo-600', 'bg-purple-700', 'bg-teal-600'];

        const App = () => {
            const [dbReady, setDbReady] = useState(false);
            const [connectionError, setConnectionError] = useState(false);

            useEffect(() => {
                let isReady = false;
                const initCloud = setInterval(() => {
                    if (window.fb && window.fb.db) {
                        clearInterval(initCloud);
                        isReady = true;
                        setDbReady(true);
                    }
                }, 200);

                const timeout = setTimeout(() => {
                    if (!isReady) {
                        clearInterval(initCloud);
                        setConnectionError(true);
                    }
                }, 8000);

                return () => {
                    clearInterval(initCloud);
                    clearTimeout(timeout);
                };
            }, []);

            // حالات النظام
            const [isLogged, setIsLogged] = useState(false);
            const [isSuperAdmin, setIsSuperAdmin] = useState(false); 
            const [currentTeamId, setCurrentTeamId] = useState(null); 
            const [currentUser, setCurrentUser] = useState(null);
            
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [isLoggingIn, setIsLoggingIn] = useState(false); 
            const [loginError, setLoginError] = useState('');
            const [authScreen, setAuthScreen] = useState('login');
            const [registrationForm, setRegistrationForm] = useState({ registrationCode: '', fullName: '', phone: '', specialty: '', password: '', image: '', nationalCardImg: '', universityCardImg: '' });
            const [isSubmittingRegistration, setIsSubmittingRegistration] = useState(false);
            const [registrationResult, setRegistrationResult] = useState(null);
            const [trackingForm, setTrackingForm] = useState({ requestId: '', password: '' });
            const [isCheckingTracking, setIsCheckingTracking] = useState(false);
            const [trackingResult, setTrackingResult] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            // بيانات الإدارة العليا (دليل الفرق)
            const [masterTeamsDirectory, setMasterTeamsDirectory] = useState([]);
            const publicMatchedTeam = masterTeamsDirectory.find(team => ((team.registrationCode || team.id || '').toUpperCase() === (registrationForm.registrationCode || '').trim().toUpperCase()) || ((team.id || '').toUpperCase() === (registrationForm.registrationCode || '').trim().toUpperCase()));
            const [newMasterTeam, setNewMasterTeam] = useState({ id: '', name: '', password: '' });
            const [teamToDeleteSuper, setTeamToDeleteSuper] = useState(null); 

            // بيانات الفريق الحالي (تم إضافة حقل badgeColor)
            const [config, setConfig] = useState({ teamNameAr: 'فريق طبي تطوعي', teamNameEn: 'Medical Team', stationName: 'المفرزة الرئيسية', generalGroupId: '', privateGroupId: '', botToken: '', logoUrl: null, isServiceEnabled: true, badgeColor: 'bg-slate-900', registrationCode: '' });
            const [volunteers, setVolunteers] = useState([]);
            const [attendanceLog, setAttendanceLog] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [services, setServices] = useState([]);
            const [activities, setActivities] = useState([]);
            const [donations, setDonations] = useState([]);
            const [penalties, setPenalties] = useState([]);
            const [messages, setMessages] = useState([]);
            const [news, setNews] = useState([]);

            const getTeamPath = (colName) => `teams/${currentTeamId}/${colName}`;
            const normalizePhone = (value) => (value || '').toString().replace(/[^\d+]/g, '');
            const maskPhone = (value) => {
                if (!value || value === '-') return '—';
                const digits = value.toString().replace(/\s+/g, '');
                if (digits.length <= 4) return '****';
                return `${digits.slice(0, 4)}****${digits.slice(-2)}`;
            };
            const maskTelegram = (value) => {
                if (!value || value === '-') return 'لم يحدد';
                const clean = value.toString().trim();
                if (clean.length <= 4) return '****';
                return `${clean.slice(0, 2)}****${clean.slice(-2)}`;
            };
            const isSensitiveUnlocked = () => isSuperAdmin;
            const generateRegistrationCode = (base = '') => {
                const seed = (base || currentTeamId || 'TEAM').toString().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6) || 'TEAM';
                const randomPart = Math.random().toString(36).toUpperCase().replace(/[^A-Z0-9]/g, '').slice(2, 6);
                return `${seed}-${randomPart}`;
            };
            const copyTextValue = async (value, successMessage = 'تم نسخ الكود') => {
                try {
                    await navigator.clipboard.writeText(value || '');
                    alert(successMessage);
                } catch (err) {
                    console.error(err);
                    alert('تعذر النسخ في هذا الجهاز.');
                }
            };
            
            const saveToCloud = async (colName, id, data, overridePath = null) => {
                if (!dbReady) return;
                try { 
                    const path = overridePath || (colName === 'config' ? `teams/${currentTeamId}/config` : getTeamPath(colName));
                    await window.fb.setDoc(window.fb.doc(window.fb.db, path, id), data); 
                } 
                catch (e) { console.error("خطأ بالحفظ", e); }
            };

            const deleteFromCloud = async (colName, id, overridePath = null) => {
                if (!dbReady) return;
                try { 
                    const path = overridePath || getTeamPath(colName);
                    await window.fb.deleteDoc(window.fb.doc(window.fb.db, path, id)); 
                } 
                catch (e) { console.error("خطأ بالحذف", e); }
            };

            useEffect(() => {
                if (!dbReady) return;
                const { db, collection, onSnapshot } = window.fb;

                const unsubMaster = onSnapshot(collection(db, 'teams_directory'), (snap) => {
                    setMasterTeamsDirectory(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsubMaster();
            }, [dbReady]);

            useEffect(() => {
                if (!dbReady || !isLogged || !currentTeamId || isSuperAdmin) return;
                const { db, collection, onSnapshot, doc, setDoc } = window.fb;

                const syncData = (colName, setter) => {
                    const path = colName === 'config' ? `teams/${currentTeamId}/config` : getTeamPath(colName);
                    return onSnapshot(collection(db, path), (snap) => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setter(data);
                        if (colName === 'volunteers' && currentUser) {
                            const updatedMe = data.find(v => v.id === currentUser.id);
                            if (updatedMe) setCurrentUser(updatedMe);
                        }
                    });
                };

                const unsubConfig = onSnapshot(doc(db, `teams/${currentTeamId}/config`, 'main'), (docSnap) => {
                    if (docSnap.exists()) {
                        setConfig(prev => ({ ...prev, registrationCode: currentTeamId?.toUpperCase() || '', ...docSnap.data() }));
                    } else {
                        const defaultConfig = { ...config, registrationCode: currentTeamId?.toUpperCase() || '' };
                        setConfig(defaultConfig);
                        setDoc(doc(db, `teams/${currentTeamId}/config`, 'main'), defaultConfig);
                    }
                });

                const unsubVols = syncData('volunteers', setVolunteers);
                const unsubAtt = syncData('attendance', setAttendanceLog);
                const unsubInv = syncData('inventory', setInventory);
                const unsubSrv = syncData('services', setServices);
                const unsubAct = syncData('activities', setActivities);
                const unsubDon = syncData('donations', setDonations);
                const unsubPen = syncData('penalties', setPenalties);
                const unsubMsg = syncData('messages', setMessages);
                const unsubNews = syncData('news', setNews);

                return () => { unsubVols(); unsubConfig(); unsubAtt(); unsubInv(); unsubSrv(); unsubAct(); unsubDon(); unsubPen(); unsubMsg(); unsubNews(); };
            }, [dbReady, isLogged, currentTeamId, isSuperAdmin]);

            const handleLogin = async (e) => {
                e.preventDefault();
                let inputUser = loginForm.username.trim();
                const pwd = loginForm.password;

                if(!inputUser || !pwd) { setLoginError('يرجى تعبئة جميع الحقول'); return; }

                setIsLoggingIn(true);
                setLoginError('');

                try {
                    const { db, doc, getDoc, setDoc, getDocs, collection } = window.fb;
                    const normalizedInput = inputUser.toLowerCase();
                    const normalizedPhoneInput = normalizePhone(inputUser);

                    if (normalizedInput === 'superadmin' && pwd === 'super123') { 
                        setIsSuperAdmin(true);
                        setCurrentUser({ id: 'superadmin', name: 'مدير النظام (المالك)', role: 'SuperAdmin' });
                        setIsLogged(true);
                        setActiveTab('master_dashboard');
                        setIsLoggingIn(false);
                        return;
                    }

                    const hydrateAndLoginVolunteer = (tid, userId, userData) => {
                        if (userData.accountStatus === 'Rejected') {
                            setLoginError(`تم رفض طلبك.${userData.rejectionReason ? ' السبب: ' + userData.rejectionReason : ''}`);
                            return false;
                        }
                        if (userData.accountStatus === 'Pending') {
                            setLoginError('حسابك قيد المراجعة. يرجى الانتظار حتى يوافق عليه المسؤول.');
                            return false;
                        }
                        if (userData.accountStatus === 'EditRequired') {
                            setLoginError(`يتطلب حسابك تعديل البيانات.${userData.rejectionReason ? ' ملاحظة الإدارة: ' + userData.rejectionReason : ''}`);
                            return false;
                        }
                        setCurrentTeamId(tid);
                        setCurrentUser({ id: userId, ...userData });
                        setUserUpdateForm({ phone: userData.phone || '', telegram: userData.telegram || '', specialty: userData.specialty || '', bloodType: userData.bloodType || 'O+', residence: userData.residence || 'النجف الأشرف', image: userData.image || '', newPassword: '', birthDay: userData.birthDay || '', birthMonth: userData.birthMonth || '', birthYear: userData.birthYear || '', nationalCardImg: null, universityCardImg: null });
                        setIsSuperAdmin(false);
                        setIsLogged(true);
                        setActiveTab('my_badge');
                        return true;
                    };

                    const looksLikePhone = /^\+?\d[\d\s-]{6,}$/.test(inputUser);

                    if (looksLikePhone) {
                        const teamsSnap = await getDocs(collection(db, 'teams_directory'));
                        let matchedVolunteer = null;

                        for (const teamDoc of teamsSnap.docs) {
                            const tid = teamDoc.id;
                            const volsSnap = await getDocs(collection(db, `teams/${tid}/volunteers`));
                            for (const volDoc of volsSnap.docs) {
                                const userData = volDoc.data();
                                if (userData.role === 'Admin') continue;
                                if (normalizePhone(userData.phone) === normalizedPhoneInput && userData.password === pwd) {
                                    matchedVolunteer = { tid, id: volDoc.id, data: userData };
                                    break;
                                }
                            }
                            if (matchedVolunteer) break;
                        }

                        if (matchedVolunteer) {
                            hydrateAndLoginVolunteer(matchedVolunteer.tid, matchedVolunteer.id, matchedVolunteer.data);
                        } else {
                            setLoginError('رقم الهاتف أو كلمة المرور غير صحيحة.');
                        }
                        setIsLoggingIn(false);
                        return;
                    }

                    if (!normalizedInput.includes('-')) {
                        const teamDocRef = doc(db, 'teams_directory', normalizedInput);
                        const teamSnap = await getDoc(teamDocRef);

                        if (teamSnap.exists() && teamSnap.data().password === pwd) {
                            setCurrentTeamId(normalizedInput);

                            const adminRef = doc(db, `teams/${normalizedInput}/volunteers`, 'admin');
                            const adminSnap = await getDoc(adminRef);
                            if(!adminSnap.exists()){
                                await setDoc(adminRef, { name: 'إدارة ' + teamSnap.data().name, role: 'Admin', specialty: 'إدارة عليا', department: 'القيادة والإدارة', bloodType: '-', phone: '-', telegram: '-', residence: '-', image: null, status: 'Off-site', password: pwd, hasEditedProfile: true });
                            }

                            const finalAdminData = adminSnap.exists() ? adminSnap.data() : { role: 'Admin', name: 'إدارة ' + teamSnap.data().name };
                            setCurrentUser({ id: 'admin', ...finalAdminData });
                            setUserUpdateForm({ phone: finalAdminData.phone || '', telegram: finalAdminData.telegram || '', specialty: finalAdminData.specialty || '', bloodType: finalAdminData.bloodType || 'O+', residence: finalAdminData.residence || 'النجف الأشرف', image: finalAdminData.image || '', newPassword: '', birthDay: finalAdminData.birthDay || '', birthMonth: finalAdminData.birthMonth || '', birthYear: finalAdminData.birthYear || '', nationalCardImg: null, universityCardImg: null });

                            setIsSuperAdmin(false);
                            setIsLogged(true);
                            setActiveTab('dashboard');
                        } else {
                            setLoginError('بيانات المفرزة غير صحيحة، أو غير مسجلة في الإدارة.');
                        }
                        setIsLoggingIn(false);
                        return;
                    }

                    const tid = normalizedInput.split('-')[0];
                    const volId = inputUser.trim().toUpperCase();

                    const teamCheckSnap = await getDoc(doc(db, 'teams_directory', tid));
                    if (!teamCheckSnap.exists()) {
                        setLoginError('هذه المفرزة غير موجودة في النظام.');
                        setIsLoggingIn(false); return;
                    }

                    const userRef = doc(db, `teams/${tid}/volunteers`, volId);
                    const userSnap = await getDoc(userRef);

                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        if (userData.password === pwd && userData.role !== 'Admin') {
                            hydrateAndLoginVolunteer(tid, userSnap.id, userData);
                        } else {
                            setLoginError('كلمة المرور غير صحيحة أو حساب إداري!');
                        }
                    } else {
                        setLoginError('رقم الهاتف أو المعرف غير موجود.');
                    }

                } catch (err) {
                    console.error(err);
                    setLoginError('حدث خطأ في الاتصال بالخوادم.');
                }

                setIsLoggingIn(false);
            };

            const handleRegistrationImageUpload = (field, file) => {
                processImageAndSave(file, (compressedData) => {
                    setRegistrationForm(prev => ({ ...prev, [field]: compressedData }));
                });
            };

            const handleVolunteerSelfRegistration = async (e) => {
                e.preventDefault();
                if (!registrationForm.registrationCode || !registrationForm.fullName || !registrationForm.phone || !registrationForm.specialty || !registrationForm.password || !registrationForm.image) {
                    alert('يرجى إكمال جميع الحقول الأساسية وإضافة الصورة الشخصية.');
                    return;
                }
                const enteredCode = registrationForm.registrationCode.trim().toUpperCase();
                const matchedTeam = masterTeamsDirectory.find(team => (team.registrationCode || team.id || '').toUpperCase() === enteredCode || (team.id || '').toUpperCase() === enteredCode);
                if (!matchedTeam) {
                    alert('كود المفرزة غير صحيح أو غير مفعل داخل النظام.');
                    return;
                }

                setIsSubmittingRegistration(true);
                try {
                    const teamId = matchedTeam.id;
                    const normalizedPhone = normalizePhone(registrationForm.phone);
                    const existingVolsSnap = await window.fb.getDocs(window.fb.collection(window.fb.db, `teams/${teamId}/volunteers`));
                    const duplicatePhone = existingVolsSnap.docs.find(d => normalizePhone((d.data() || {}).phone) === normalizedPhone);
                    if (duplicatePhone) {
                        alert('رقم الهاتف مسجل مسبقاً داخل هذه المفرزة.');
                        setIsSubmittingRegistration(false);
                        return;
                    }

                    const requestId = `${teamId.toUpperCase()}-${Date.now().toString().slice(-6)}`;
                    const volunteerData = {
                        name: registrationForm.fullName,
                        phone: registrationForm.phone,
                        specialty: registrationForm.specialty,
                        password: registrationForm.password,
                        image: registrationForm.image,
                        nationalCardImg: registrationForm.nationalCardImg || null,
                        universityCardImg: registrationForm.universityCardImg || null,
                        department: 'بانتظار توزيع المسؤول',
                        role: 'Student',
                        status: 'Off-site',
                        hasEditedProfile: true,
                        residence: 'النجف الأشرف',
                        bloodType: '-',
                        telegram: '',
                        birthDay: '',
                        birthMonth: '',
                        birthYear: '',
                        accountStatus: 'Pending',
                        registrationCodeUsed: enteredCode,
                        createdAt: new Date().toISOString(),
                        requestType: 'SelfRegistration'
                    };
                    await window.fb.setDoc(window.fb.doc(window.fb.db, `teams/${teamId}/volunteers`, requestId), volunteerData);
                    const msgId = `MSG-${Date.now()}`;
                    await window.fb.setDoc(window.fb.doc(window.fb.db, `teams/${teamId}/messages`, msgId), { senderId: 'system', senderName: 'بوابة التسجيل', receiverId: 'admin', type: 'private', subject: 'طلب انضمام جديد', content: `تم استلام طلب متطوع جديد باسم ${registrationForm.fullName} ورقم هاتف ${registrationForm.phone}. رقم الطلب: ${requestId}`, date: new Date().toLocaleString('ar-IQ', {dateStyle:'short', timeStyle:'short'}), isRead: false });
                    setRegistrationResult({ requestId, teamName: matchedTeam.name });
                    setTrackingForm({ requestId, password: registrationForm.password });
                    setRegistrationForm({ registrationCode: '', fullName: '', phone: '', specialty: '', password: '', image: '', nationalCardImg: '', universityCardImg: '' });
                    setAuthScreen('track');
                } catch (err) {
                    console.error(err);
                    alert('حدث خطأ أثناء إرسال الطلب. حاول مرة أخرى.');
                }
                setIsSubmittingRegistration(false);
            };

            const handleTrackRequest = async (e) => {
                e.preventDefault();
                if (!trackingForm.requestId || !trackingForm.password) return;
                setIsCheckingTracking(true);
                try {
                    const requestId = trackingForm.requestId.trim().toUpperCase();
                    const tid = requestId.split('-')[0]?.toLowerCase();
                    if (!tid) throw new Error('invalid-id');
                    const userRef = window.fb.doc(window.fb.db, `teams/${tid}/volunteers`, requestId);
                    const userSnap = await window.fb.getDoc(userRef);
                    if (!userSnap.exists()) {
                        setTrackingResult({ error: 'رقم الطلب غير موجود.' });
                    } else {
                        const data = userSnap.data();
                        if (data.password !== trackingForm.password) {
                            setTrackingResult({ error: 'كلمة المرور غير صحيحة.' });
                        } else {
                            setTrackingResult({ id: requestId, ...data });
                        }
                    }
                } catch (err) {
                    console.error(err);
                    setTrackingResult({ error: 'تعذر قراءة الطلب حالياً.' });
                }
                setIsCheckingTracking(false);
            };

                const reader = new FileReader();
                reader.onloadend = () => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); 
                        const MAX_SIZE = 400; 
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height; 
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        callback(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);

<script>
(() => {
  let deferredPrompt = null;
  const installBtn = document.getElementById('pwaInstallBtn');
  const offlineBadge = document.getElementById('offlineBadge');
  const iosInstallHint = document.getElementById('iosInstallHint');

  const isIos = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

  function updateOfflineState() {
    if (!offlineBadge) return;
    offlineBadge.style.display = navigator.onLine ? 'none' : 'block';
  }

  window.addEventListener('online', updateOfflineState);
  window.addEventListener('offline', updateOfflineState);
  updateOfflineState();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        await navigator.serviceWorker.register('./sw.js');
      } catch (err) {
        console.error('SW registration failed:', err);
      }
    });
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn && !isStandalone) installBtn.style.display = 'inline-flex';
  });

  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    if (installBtn) installBtn.style.display = 'none';
  });

  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (isIos) {
        if (iosInstallHint && !isStandalone) iosInstallHint.style.display = 'block';
        return;
      }
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });
  }

  if (isIos && !isStandalone && installBtn) {
    installBtn.style.display = 'inline-flex';
  }
})();
</script>
